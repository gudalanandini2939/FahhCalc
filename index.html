<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FahhCalc</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="symbols">
    <span>π</span><span>√</span><span>∑</span><span>∞</span><span>β</span>
    <span>±</span><span>%</span><span>≈</span><span>λ</span><span>Ω</span>
  </div>

  <main class="page">
    <section class="calculator" id="calculator">

      <div class="top">
        <h1>FahhCalc</h1>

        <div class="top-actions">
          <button id="soundBtn" title="Sound">🔊</button>
          <button id="historyBtn" title="History">🕘</button>
        </div>
      </div>

      <div class="screen">
        <div id="expression"></div>
        <div id="result">0</div>
      </div>

      <button id="copyBtn" class="copy">📋 Copy Result</button>

      <div class="small-actions">
        <button id="themeSmall">🎨 Theme</button>
        <button id="moreSmall">▦ More Functions</button>
      </div>

      <div class="keys">
        <button class="danger" data-key="AC">AC</button>
        <button data-key="LEFT">←</button>
        <button data-key="RIGHT">→</button>
        <button data-key="DEL">DEL</button>

        <button data-key="%">%</button>
        <button class="operator" data-key="/">÷</button>

        <button data-key="7">7</button>
        <button data-key="8">8</button>
        <button data-key="9">9</button>
        <button class="operator" data-key="*">×</button>

        <button data-key="4">4</button>
        <button data-key="5">5</button>
        <button data-key="6">6</button>
        <button class="operator" data-key="-">−</button>

        <button data-key="1">1</button>
        <button data-key="2">2</button>
        <button data-key="3">3</button>
        <button class="operator" data-key="+">+</button>

        <button class="zero" data-key="0">0</button>
        <button data-key=".">.</button>
        <button class="equal" data-key="=">=</button>
      </div>

    </section>

    <section class="panel" id="morePanel">
      <div class="panel-head">
        <h2>More Functions</h2>
        <button id="closeMore">×</button>
      </div>

      <div class="func-grid">
        <button data-func="sqrt">√<small>Root</small></button>
        <button data-func="square">x²<small>Square</small></button>
        <button data-func="power">xʸ<small>Power</small></button>

        <button data-func="sin">sin<small>Sine</small></button>
        <button data-func="cos">cos<small>Cos</small></button>
        <button data-func="tan">tan<small>Tan</small></button>

        <button data-func="log">log<small>Base 10</small></button>
        <button data-func="ln">ln<small>Natural</small></button>
        <button data-func="fact">!<small>Factorial</small></button>

        <button data-func="paren">( )<small>Bracket</small></button>
        <button data-func="pi">π<small>Pi</small></button>
        <button data-func="e">e<small>Euler</small></button>
      </div>
    </section>

    <section class="panel history-panel" id="historyPanel">
      <div class="panel-head">
        <h2>History</h2>
        <button id="clearHistory">Clear</button>
        <button id="closeHistory">×</button>
      </div>

      <div class="stats">
        <div>
          <h3 id="totalCalcs">0</h3>
          <p>Calculations</p>
        </div>
        <div>
          <h3 id="fahhCount">0</h3>
          <p>Fahh Moments</p>
        </div>
        <div>
          <h3 id="accuracy">100%</h3>
          <p>Accuracy</p>
        </div>
      </div>

      <div id="historyList">
        <p class="empty">No history yet</p>
      </div>
    </section>
  </main>

  <audio id="errorSound" src="fahh.mp3" preload="auto"></audio>
  <script src="index.js"></script>
</body>
</html>
